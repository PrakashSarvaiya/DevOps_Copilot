version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: DevOps_db
    restart: always
    environment:
      POSTGRES_USER: DevOps_user
      POSTGRES_PASSWORD: DevOps_password
      POSTGRES_DB: DevOps_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:latest
    container_name: DevOps_chromadb
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: DevOps_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://DevOps_user:DevOps_password@db:5432/DevOps_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeyshouldbechangedinproduction123}
      - ENVIRONMENT=development
    depends_on:
      - db
      - chromadb

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: DevOps_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
